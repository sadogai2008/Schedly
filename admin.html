<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedly — 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0d;--bg2:#111318;--bg3:#181c22;--surface:#1e232c;--surface2:#252b36;--border:#2a3040;--border2:#333d4f;--text:#e8eaf0;--text2:#9aa3b2;--text3:#5c6a80;--accent:#f0a500;--accent2:#e8920a;--accent-dim:rgba(240,165,0,0.12);--accent-dim2:rgba(240,165,0,0.06);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--yellow:#eab308;--yellow-dim:rgba(234,179,8,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);--radius:10px;--radius2:14px;--shadow:0 4px 24px rgba(0,0,0,0.4);--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--transition:0.18s cubic-bezier(0.4,0,0.2,1);}
[data-theme="light"]{--bg:#f4f5f7;--bg2:#ffffff;--bg3:#f0f1f4;--surface:#ffffff;--surface2:#f8f9fb;--border:#e2e5ea;--border2:#cdd0d8;--text:#0f1117;--text2:#4a5468;--text3:#8a94a6;--accent:#d4890a;--accent2:#b87209;--accent-dim:rgba(212,137,10,0.1);--accent-dim2:rgba(212,137,10,0.05);--shadow:0 2px 16px rgba(0,0,0,0.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;}
input,textarea,select,button{font-family:var(--font);}button{cursor:pointer;}
.header{position:sticky;top:0;z-index:100;background:rgba(10,11,13,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
[data-theme="light"] .header{background:rgba(244,245,247,0.9);}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:20px;letter-spacing:-0.02em;color:var(--text);text-decoration:none;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0a0b0d;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:8px;}
.admin-badge{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,0.2);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.theme-toggle{background:none;border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--transition);}
.theme-toggle:hover{background:var(--surface);}
.main{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
.event-header-card{background:linear-gradient(135deg,var(--surface) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:var(--radius2);padding:24px 28px;margin-bottom:24px;position:relative;overflow:hidden;animation:fadeInDown 0.4s ease both;}
.event-header-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--purple));}
.event-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.event-title-area{flex:1;}
.event-status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.status-open{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.status-confirmed{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(240,165,0,0.2);}
.status-closed{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.event-title{font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:-0.02em;}
.event-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;}
.event-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;}
/* countdown */
.countdown-bar{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.countdown-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.countdown-time{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent);}
.countdown-time.urgent{color:var(--red);}
/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px 18px;animation:fadeInUp 0.4s ease both;}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
/* progress bar */
.progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.8s;}
/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:16px;animation:fadeInUp 0.4s ease both;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.card-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;}
.card-icon{width:28px;height:28px;background:var(--accent-dim);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
/* result rows */
.result-row{display:grid;grid-template-columns:1fr auto auto auto auto auto;gap:8px;align-items:center;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg3);margin-bottom:6px;transition:var(--transition);}
@media(max-width:600px){.result-row{grid-template-columns:1fr;}}
.result-row:hover{border-color:var(--border2);background:var(--surface2);}
.result-row.top-candidate{border-color:var(--accent);background:var(--accent-dim2);}
.result-row.top-candidate .recommend-tag{display:inline-flex;}
.recommend-tag{display:none;align-items:center;gap:4px;background:var(--accent);color:#0a0b0d;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;}
.result-datetime{font-size:14px;font-weight:500;}
.result-datetime-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.result-score{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-family:var(--mono);}
.result-counts{display:flex;align-items:center;gap:6px;}
.count-badge{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:600;}
.count-circle{background:var(--green-dim);color:var(--green);}
.count-triangle{background:var(--yellow-dim);color:var(--yellow);}
.count-cross{background:var(--red-dim);color:var(--red);}
.score-bar-wrap{width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.score-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.8s;}
.btn-confirm-date{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;transition:var(--transition);white-space:nowrap;}
.btn-confirm-date:hover{background:rgba(34,197,94,0.2);}
/* all-ng badge */
.all-ng-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;}
/* participant table */
.participant-table{width:100%;border-collapse:collapse;}
.participant-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.participant-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.participant-table tr:last-child td{border-bottom:none;}
.participant-table tr:hover td{background:var(--surface2);}
.p-replied{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.p-replied.yes{background:var(--green-dim);color:var(--green);}
.p-replied.no{background:var(--red-dim);color:var(--red);}
/* votes detail */
.votes-detail-grid{display:flex;flex-direction:column;gap:8px;}
.vote-detail-row{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
.vote-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.vote-detail-name{font-size:14px;font-weight:600;}
.vote-detail-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
.vote-answers{display:flex;flex-wrap:wrap;gap:6px;}
.vote-answer-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;border:1px solid;}
.answer-circle{background:var(--green-dim);color:var(--green);border-color:rgba(34,197,94,0.2);}
.answer-triangle{background:var(--yellow-dim);color:var(--yellow);border-color:rgba(234,179,8,0.2);}
.answer-cross{background:var(--red-dim);color:var(--red);border-color:rgba(239,68,68,0.2);}
.vote-condition{font-size:12px;color:var(--text3);margin-top:4px;padding-left:4px;border-left:2px solid var(--yellow);}
.vote-comment{font-size:12px;color:var(--text2);margin-top:6px;padding:6px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border);}
/* proposals */
.proposal-row{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;}
.proposal-row.accepted{border-color:var(--green);}
.proposal-row.rejected{border-color:var(--red);opacity:0.6;}
.proposal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.proposal-date{font-size:15px;font-weight:600;color:var(--accent);}
.proposal-from{font-size:12px;color:var(--text3);}
.proposal-msg{font-size:13px;color:var(--text2);margin-bottom:10px;}
.proposal-actions{display:flex;gap:8px;}
/* question results */
.q-result-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;}
.q-result-title{font-size:14px;font-weight:600;margin-bottom:10px;}
.q-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.q-bar-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.q-bar-fill{height:100%;border-radius:4px;background:var(--accent);}
.q-bar-count{font-size:12px;color:var(--text3);width:40px;text-align:right;flex-shrink:0;}
/* tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius);padding:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{flex:1;padding:8px 10px;border-radius:7px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;transition:var(--transition);cursor:pointer;white-space:nowrap;min-width:80px;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
/* btn */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:14px;font-weight:500;padding:10px 18px;border-radius:var(--radius);border:none;transition:var(--transition);white-space:nowrap;}
.btn-primary{background:var(--accent);color:#0a0b0d;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,165,0,0.3);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface);border-color:var(--border2);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.btn-success:hover{background:rgba(34,197,94,0.2);}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;}
.btn-icon{width:28px;height:28px;border-radius:7px;border:none;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--transition);flex-shrink:0;}
/* modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.visible{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;max-width:480px;width:100%;animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-0.02em;margin-bottom:12px;}
.modal-desc{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.modal-date-preview{background:var(--bg3);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-weight:600;font-size:16px;color:var(--accent);}
/* loading/error */
.loading-state{text-align:center;padding:80px 20px;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
.error-state{text-align:center;padding:60px 20px;}
.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:14px;}
/* toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);animation:toastIn 0.3s ease both;pointer-events:all;max-width:320px;}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}
.toast-out{animation:toastOut 0.3s ease forwards;}
.spinner{width:14px;height:14px;border:2px solid rgba(10,11,13,0.3);border-top-color:#0a0b0d;border-radius:50%;animation:spin 0.7s linear infinite;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:14px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes popIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px);}}
</style>
</head>
<body>
<header class="header">
  <a class="logo" href="index.html"><div class="logo-mark">S</div>Schedly</a>
  <div class="header-right">
    <span class="admin-badge">⚙ 管理者</span>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</header>

<main class="main" id="mainContent">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div style="color:var(--text3);font-size:14px">読み込み中...</div>
  </div>
</main>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">

      <button class="btn btn-secondary btn-sm" id="cancelConfirmBtn">キャンセル</button>
      <button class="btn btn-primary btn-sm" id="doConfirmBtn"><span id="doConfirmText">✓ 確定する</span></button>
    </div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBF7wMidu7J83xK4Cn3RJINyz0MWdOBs0I",authDomain:"schedly-2d50c.firebaseapp.com",projectId:"schedly-2d50c",storageBucket:"schedly-2d50c.firebasestorage.app",messagingSenderId:"703737030595",appId:"1:703737030595:web:a7e350361aa790e749ff76"};
try{
  const app=initializeApp(firebaseConfig);const db=getFirestore(app);
  window._db=db;
  window._fsOps={doc,getDoc,updateDoc,collection,getDocs,setDoc,addDoc,serverTimestamp};
  window._firebaseReady=true;
}catch(e){window._firebaseReady=false;window._firebaseError=e.message;}
</script>

<script>
// ======================================================
// EmailJS アカウントB（確定・リマインド）
// ======================================================
const EMAILJS_B={
  publicKey:'YOUR_ACCOUNTB_PUBLIC_KEY',
  serviceId:'YOUR_ACCOUNTB_SERVICE_ID',
  confirmTemplateId:'YOUR_CONFIRM_TEMPLATE_ID',
  reminderTemplateId:'YOUR_REMINDER_TEMPLATE_ID',
  proposalTemplateId:'YOUR_PROPOSAL_TEMPLATE_ID'
};
// ======================================================
try{emailjs.init(EMAILJS_B.publicKey);}catch(e){}

const params=new URLSearchParams(location.search);
const eventId=params.get('id');
const adminToken=params.get('token');
let eventData=null,votes={},participants=[],proposals=[];
let pendingConfirmDate=null,activeTab='results';
let countdownTimer=null;

// Theme
const html=document.documentElement;
const themeToggle=document.getElementById('themeToggle');
const savedTheme=localStorage.getItem('schedlyTheme')||'dark';
html.setAttribute('data-theme',savedTheme);
themeToggle.textContent=savedTheme==='dark'?'☀️':'🌙';
themeToggle.addEventListener('click',function(){
  const n=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',n);localStorage.setItem('schedlyTheme',n);
  themeToggle.textContent=n==='dark'?'☀️':'🌙';
});

// Init
window.addEventListener('DOMContentLoaded',async function(){
  if(!eventId){showError('イベントIDが指定されていません');return;}
  // Firebase待機
  let w=0;while(!window._firebaseReady&&!window._firebaseError&&w<3000){await sleep(100);w+=100;}
  await loadData();
});

async function loadData(){
  try{
    if(window._db){
      const{doc,getDoc,collection,getDocs}=window._fsOps;
      const snap=await getDoc(doc(window._db,'events',eventId));
      if(!snap.exists()){showError('イベントが見つかりません');return;}
      eventData={id:eventId,...snap.data()};
      if(adminToken&&eventData.adminToken!==adminToken){showError('アクセス権限がありません','管理者URLからアクセスしてください');return;}
      const vSnap=await getDocs(collection(window._db,'events',eventId,'votes'));
      vSnap.forEach(function(d){votes[d.id]=d.data();});
      const pSnap=await getDocs(collection(window._db,'events',eventId,'participants'));
      pSnap.forEach(function(d){participants.push(d.data());});
      const prSnap=await getDocs(collection(window._db,'events',eventId,'proposals'));
      prSnap.forEach(function(d){proposals.push({id:d.id,...d.data()});});
    }else{
      const stored=localStorage.getItem('schedly_event_'+eventId);
      if(!stored){showError('イベントが見つかりません');return;}
      eventData=JSON.parse(stored);
      if(adminToken&&eventData.adminToken!==adminToken){showError('アクセス権限がありません');return;}
      votes=JSON.parse(localStorage.getItem('schedly_votes_'+eventId)||'{}');
      participants=JSON.parse(localStorage.getItem('schedly_participants_'+eventId)||'[]');
      proposals=JSON.parse(localStorage.getItem('schedly_proposals_'+eventId)||'[]');
    }
    renderPage();
    startCountdown();
  }catch(e){showError('読み込みエラー: '+e.message);}
}

// ─── Countdown ───
function startCountdown(){
  if(countdownTimer)clearInterval(countdownTimer);
  updateCountdown();
  countdownTimer=setInterval(updateCountdown,1000);
}
function updateCountdown(){
  const el=document.getElementById('countdownTime');if(!el||!eventData.deadline)return;
  const diff=new Date(eventData.deadline)-new Date();
  if(diff<=0){el.textContent='締切済';el.classList.add('urgent');clearInterval(countdownTimer);return;}
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  const isUrgent=diff<86400000;
  el.classList.toggle('urgent',isUrgent);
  if(d>0) el.textContent=d+'日 '+pad(h)+'時間 '+pad(m)+'分';
  else if(h>0) el.textContent=pad(h)+'時間 '+pad(m)+'分 '+pad(s)+'秒';
  else el.textContent=pad(m)+'分 '+pad(s)+'秒';
  // ラベル
  const lbl=document.getElementById('countdownLabel');if(!lbl)return;
  if(d===0&&h===0) lbl.textContent='⚠️ もうすぐ締切！';
  else if(d===0) lbl.textContent='今日 締切';
  else if(d===1) lbl.textContent='明日 締切';
  else lbl.textContent='締切まで';
}
function pad(n){return String(n).padStart(2,'0');}

// ─── Compute Results ───
function computeResults(){
  const vArr=Object.values(votes);
  const dateMap={};
  (eventData.dates||[]).forEach(function(d){dateMap[d.datetime]={...d,circle:0,triangle:0,cross:0,score:0,voters:[]};});
  vArr.forEach(function(v){
    Object.entries(v.answers||{}).forEach(function(e){
      const k=e[0],t=e[1];
      if(!dateMap[k])return;
      if(t==='circle'){dateMap[k].circle++;dateMap[k].score+=2;}
      else if(t==='triangle'){dateMap[k].triangle++;dateMap[k].score+=1;}
      else if(t==='cross'){dateMap[k].cross++;}
      dateMap[k].voters.push({name:v.name,type:t});
    });
  });
  const results=Object.values(dateMap).sort(function(a,b){return b.score-a.score;});
  const maxScore=results[0]?results[0].score:0;
  results.forEach(function(r){r.isTop=r.score===maxScore&&maxScore>0;r.allNG=(r.cross===vArr.length&&vArr.length>0);});
  return results;
}

// ─── Render Page ───
function renderPage(){
  const vArr=Object.values(votes);
  const repliedCount=vArr.length;
  const results=computeResults();
  const maxScore=results[0]?results[0].score:0;
  const isConfirmed=eventData.status==='confirmed';
  const isClosed=eventData.status==='closed';
  const deadline=eventData.deadline?new Date(eventData.deadline):null;
  const deadlineStr=deadline?deadline.toLocaleDateString('ja-JP',{year:'numeric',month:'short',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'}):'—';
  const statusLabel={open:'受付中',confirmed:'日程確定済',closed:'締切済'};
  const statusClass={open:'status-open',confirmed:'status-confirmed',closed:'status-closed'};
  const eventUrl=location.origin+location.pathname.replace('admin.html','')+'event.html?id='+eventId;
  const unrespondedCount=eventData.mode==='closed'?Math.max(0,participants.length-repliedCount):0;
  const responseRate=eventData.mode==='closed'&&participants.length>0?Math.round(repliedCount/participants.length*100):null;
  const pendingProposals=proposals.filter(function(p){return p.status==='pending';}).length;

  document.getElementById('mainContent').innerHTML=
    '<div class="event-header-card">'+
      '<div class="event-header-top">'+
        '<div class="event-title-area">'+
          '<span class="event-status-badge '+(statusClass[eventData.status]||'status-open')+'">'+(statusLabel[eventData.status]||'受付中')+'</span>'+
          '<div class="event-title">'+escHtml(eventData.title)+'</div>'+
          '<div class="event-meta">'+
            (eventData.location?'<div class="event-meta-item">📍 '+escHtml(eventData.location)+'</div>':'')+
            '<div class="event-meta-item">⏰ 締切: '+deadlineStr+'</div>'+
            '<div class="event-meta-item">'+(eventData.mode==='closed'?'🔒 クローズド':'🌐 オープン')+'</div>'+
            (eventData.maxAnswers?'<div class="event-meta-item">👥 上限: '+eventData.maxAnswers+'名</div>':'')+
          '</div>'+
        '</div>'+
        '<div class="header-actions">'+
          '<a href="'+eventUrl+'" target="_blank" class="btn btn-secondary btn-sm">🔗 回答ページ</a>'+
          (!isConfirmed&&!isClosed?'<button class="btn btn-danger btn-sm" id="closeEventBtn">⏹ 受付終了</button>':'')+
        '</div>'+
      '</div>'+
      (isConfirmed&&eventData.confirmedDate?
        '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">'+
          '<div style="font-size:12px;color:var(--text3);margin-bottom:4px">確定日程</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--accent)">'+formatDatetime(eventData.confirmedDate.datetime||eventData.confirmedDate)+'</div>'+
        '</div>':'')+
      (eventData.note?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--text2)">📝 '+escHtml(eventData.note)+'</div>':'')+
      '<div class="countdown-bar">'+
        '<div class="countdown-label" id="countdownLabel">締切まで</div>'+
        '<div class="countdown-time" id="countdownTime">—</div>'+
      '</div>'+
    '</div>'+

    '<div class="stats-grid">'+
      '<div class="stat-card"><div class="stat-label">回答数</div><div class="stat-value" style="color:var(--green)">'+repliedCount+'</div><div class="stat-sub">名が回答</div></div>'+
      '<div class="stat-card"><div class="stat-label">候補日数</div><div class="stat-value" style="color:var(--blue)">'+(eventData.dates||[]).length+'</div><div class="stat-sub">候補</div></div>'+
      (eventData.mode==='closed'?
        '<div class="stat-card"><div class="stat-label">未回答</div><div class="stat-value" style="color:var(--red)">'+unrespondedCount+'</div>'+
        (responseRate!==null?'<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+responseRate+'%"></div></div><div class="stat-sub">回答率 '+responseRate+'%</div>':'<div class="stat-sub">名</div>')+
        '</div>':
        '<div class="stat-card"><div class="stat-label">最高スコア</div><div class="stat-value" style="color:var(--accent)">'+maxScore+'</div><div class="stat-sub">点</div></div>')+
      '<div class="stat-card"><div class="stat-label">対案</div><div class="stat-value" style="color:var(--purple)">'+pendingProposals+'</div><div class="stat-sub">件 保留中</div></div>'+
      '<div class="stat-card"><div class="stat-label">ステータス</div><div class="stat-value" style="font-size:16px;font-weight:600">'+(statusLabel[eventData.status]||'受付中')+'</div><div class="stat-sub">&nbsp;</div></div>'+
    '</div>'+

    '<div class="tabs">'+
      '<button class="tab-btn '+(activeTab==='results'?'active':'')+'" data-tab="results">📊 集計</button>'+
      '<button class="tab-btn '+(activeTab==='votes'?'active':'')+'" data-tab="votes">📝 回答</button>'+
      (eventData.mode==='closed'?'<button class="tab-btn '+(activeTab==='participants'?'active':'')+'" data-tab="participants">👥 参加者</button>':'')+
      '<button class="tab-btn '+(activeTab==='proposals'?'active':'')+'" data-tab="proposals">💡 対案'+(pendingProposals>0?' ('+pendingProposals+')':'')+' </button>'+
      ((eventData.questions||[]).length>0?'<button class="tab-btn '+(activeTab==='qresults'?'active':'')+'" data-tab="qresults">❓ 質問集計</button>':'')+
    '</div>'+
    '<div id="tabContent">'+renderTabContent()+'</div>';

  // イベント再設定
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){switchTab(this.getAttribute('data-tab'));});
  });
  const closeBtn=document.getElementById('closeEventBtn');
  if(closeBtn)closeBtn.addEventListener('click',closeEvent);
  // モーダルボタンは重複防止のため初回のみバインド
  if(!window._modalBound){
    document.getElementById('cancelConfirmBtn').addEventListener('click',closeModal);
    document.getElementById('doConfirmBtn').addEventListener('click',doConfirm);
    window._modalBound=true;
  }
  startCountdown();
  bindTabEvents();
}

function renderTabContent(){
  if(activeTab==='results')     return renderResultsTab();
  if(activeTab==='votes')       return renderVotesTab();
  if(activeTab==='participants')return renderParticipantsTab();
  if(activeTab==='proposals')   return renderProposalsTab();
  if(activeTab==='qresults')    return renderQResultsTab();
  return '';
}

// ─── Results Tab ───
function renderResultsTab(){
  const results=computeResults();
  const maxScore=results[0]?results[0].score:0;
  const isConfirmed=eventData.status==='confirmed';
  if(!results.length)return'<div class="card"><div class="empty-state">📅 候補日時がありません</div></div>';
  return'<div class="card">'+
    '<div class="card-header"><div class="card-title"><div class="card-icon">🏆</div>候補日時の集計</div><div style="font-size:12px;color:var(--text3)">◎=2点 △=1点 ✕=0点</div></div>'+
    results.map(function(r){
      const d=new Date(r.datetime);
      const ds=d.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
      const ts=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      const pct=maxScore>0?Math.round(r.score/maxScore*100):0;
      return'<div class="result-row '+(r.isTop&&!isConfirmed?'top-candidate':'')+'">'+
        '<div>'+
          '<div class="result-datetime">'+ds+' '+ts+(r.duration?' ・'+r.duration:'')+'</div>'+
          '<div class="result-datetime-sub">'+r.datetime+'</div>'+
          (r.isTop&&!isConfirmed?'<span class="recommend-tag">⭐ おすすめ</span>':'')+
          (r.allNG?'<span class="all-ng-badge">⚠️ 全員NG</span>':'')+
        '</div>'+
        '<div class="result-counts">'+
          '<span class="count-badge count-circle">◎ '+r.circle+'</span>'+
          '<span class="count-badge count-triangle">△ '+r.triangle+'</span>'+
          '<span class="count-badge count-cross">✕ '+r.cross+'</span>'+
        '</div>'+
        '<div><div class="result-score" style="color:'+(r.isTop?'var(--accent)':'var(--text)')+'">'+r.score+'pt</div></div>'+
        '<div><div class="score-bar-wrap"><div class="score-bar" style="width:'+pct+'%"></div></div></div>'+
        (!isConfirmed?
          '<button class="btn-confirm-date" data-dt="'+r.datetime+'" data-label="'+escHtml(r.label||ds+' '+ts)+'" data-dur="'+(r.duration||'')+'">✓ この日で確定</button>':
          (eventData.confirmedDate&&(eventData.confirmedDate.datetime||eventData.confirmedDate)===r.datetime?'<span style="color:var(--accent);font-size:12px;font-weight:600">✓ 確定済</span>':''))+
      '</div>';
    }).join('')+
  '</div>';
}

// ─── Votes Tab ───
function renderVotesTab(){
  const vArr=Object.values(votes);
  const isAnon=eventData.anonymous;
  if(!vArr.length)return'<div class="card"><div class="empty-state">📝 まだ回答がありません</div></div>';
  return'<div class="card">'+
    '<div class="card-header">'+
      '<div class="card-title"><div class="card-icon">📝</div>回答一覧 <span style="font-size:12px;color:var(--text3);font-weight:400">'+vArr.length+'名</span></div>'+
      (eventData.mode==='closed'?'<button class="btn btn-secondary btn-sm" id="sendReminderBtn">📧 未回答者にリマインド</button>':'')+
    '</div>'+
    '<div class="votes-detail-grid">'+
    vArr.map(function(v){
      const updAt=v.updatedAt?new Date(v.updatedAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      const displayName=isAnon?'匿名':(v.name||'匿名');
      return'<div class="vote-detail-row">'+
        '<div class="vote-detail-header">'+
          '<div class="vote-detail-name">'+escHtml(displayName)+'</div>'+
          '<div class="vote-detail-time">'+updAt+'</div>'+
        '</div>'+
        '<div class="vote-answers">'+
        (eventData.dates||[]).map(function(d){
          const type=(v.answers||{})[d.datetime];if(!type)return'';
          const sym={circle:'◎',triangle:'△',cross:'✕'};
          const cls={circle:'answer-circle',triangle:'answer-triangle',cross:'answer-cross'};
          const date=new Date(d.datetime);
          const label=date.toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          const cond=(v.comments||{})[d.datetime];
          return'<div>'+
            '<span class="vote-answer-chip '+cls[type]+'">'+sym[type]+' '+label+'</span>'+
            (cond?'<div class="vote-condition">'+escHtml(cond)+'</div>':'')+
          '</div>';
        }).join('')+
        '</div>'+
        (v.comment?'<div class="vote-comment">💬 '+escHtml(v.comment)+'</div>':'')+
      '</div>';
    }).join('')+
    '</div></div>';
}

// ─── Participants Tab ───
function renderParticipantsTab(){
  const vArr=Object.values(votes);
  const emailsReplied=new Set(vArr.map(function(v){return v.name;}));
  const unreplied=participants.filter(function(p){return!p.replied&&!emailsReplied.has(p.email);});
  const base=location.origin+location.pathname.replace('admin.html','');
  return'<div class="card">'+
    '<div class="card-header">'+
      '<div class="card-title"><div class="card-icon">👥</div>参加者一覧 <span style="font-size:12px;color:var(--text3);font-weight:400">'+participants.length+'名</span></div>'+
      '<button class="btn btn-secondary btn-sm" id="sendReminderBtn2">📧 未回答者にリマインド ('+unreplied.length+'名)</button>'+
    '</div>'+
    (!participants.length?'<div class="empty-state">参加者が登録されていません</div>':
      '<table class="participant-table">'+
        '<thead><tr><th>メールアドレス</th><th>回答状況</th><th>回答内容</th></tr></thead>'+
        '<tbody>'+participants.map(function(p){
          const vote=vArr.find(function(v){return v.name===p.email||v.token===p.token;});
          const hasReplied=p.replied||!!vote;
          const pUrl=base+'event.html?id='+eventId+'&token='+p.token;
          return'<tr>'+
            '<td><a href="'+pUrl+'" target="_blank" style="color:var(--blue);text-decoration:none">'+escHtml(p.email)+'</a></td>'+
            '<td><span class="p-replied '+(hasReplied?'yes':'no')+'">'+(hasReplied?'✓ 回答済':'✕ 未回答')+'</span></td>'+
            '<td>'+(vote?
              '<span style="font-size:12px;color:var(--text2)">◎'+Object.values(vote.answers||{}).filter(function(a){return a==='circle';}).length+' △'+Object.values(vote.answers||{}).filter(function(a){return a==='triangle';}).length+' ✕'+Object.values(vote.answers||{}).filter(function(a){return a==='cross';}).length+'</span>':
              '<span style="font-size:12px;color:var(--text3)">—</span>')+
            '</td>'+
          '</tr>';
        }).join('')+'</tbody></table>')+
  '</div>';
}

// ─── Q Results Tab ───
function renderQResultsTab(){
  const vArr=Object.values(votes);
  const qs=eventData.questions||[];
  if(!qs.length)return'<div class="card"><div class="empty-state">❓ 追加質問がありません</div></div>';
  return'<div class="card">'+
    '<div class="card-header"><div class="card-title"><div class="card-icon">❓</div>追加質問 集計</div></div>'+
    qs.map(function(q){
      const answers=vArr.map(function(v){return(v.questionAnswers||{})[q.id];}).filter(Boolean);
      if(q.type==='text'){
        return'<div class="q-result-card">'+
          '<div class="q-result-title">'+escHtml(q.text)+'</div>'+
          (answers.length?answers.map(function(a){return'<div style="font-size:13px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border)">'+escHtml(String(a))+'</div>';}).join(''):
          '<div style="font-size:13px;color:var(--text3)">回答なし</div>')+
        '</div>';
      }
      // single/multi
      const counts={};
      (q.options||[]).forEach(function(o){counts[o]=0;});
      answers.forEach(function(a){
        const vals=Array.isArray(a)?a:[a];
        vals.forEach(function(v){if(counts[v]!==undefined)counts[v]++;});
      });
      const maxC=Math.max.apply(null,Object.values(counts))||1;
      return'<div class="q-result-card">'+
        '<div class="q-result-title">'+escHtml(q.text)+'</div>'+
        Object.entries(counts).map(function(e){
          return'<div class="q-bar-row">'+
            '<div class="q-bar-label" title="'+escHtml(e[0])+'">'+escHtml(e[0])+'</div>'+
            '<div class="q-bar-wrap"><div class="q-bar-fill" style="width:'+Math.round(e[1]/maxC*100)+'%"></div></div>'+
            '<div class="q-bar-count">'+e[1]+'</div>'+
          '</div>';
        }).join('')+
      '</div>';
    }).join('')+
  '</div>';
}

// ─── Tab Switch ───
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===tab);});
  document.getElementById('tabContent').innerHTML=renderTabContent();
  bindTabEvents();
}

function bindTabEvents(){
  // confirm buttons
  document.querySelectorAll('.btn-confirm-date').forEach(function(btn){
    btn.addEventListener('click',function(){
      openConfirmModal(this.getAttribute('data-dt'),this.getAttribute('data-label'),this.getAttribute('data-dur'));
    });
  });
  // reminder
  const rBtn=document.getElementById('sendReminderBtn');
  if(rBtn)rBtn.addEventListener('click',sendReminder);
  const rBtn2=document.getElementById('sendReminderBtn2');
  if(rBtn2)rBtn2.addEventListener('click',sendReminder);
  // proposals
  document.querySelectorAll('[data-action="accept"],[data-action="reject"]').forEach(function(btn){
    btn.addEventListener('click',function(){
      handleProposal(this.getAttribute('data-pid'),this.getAttribute('data-action'));
    });
  });
}

// ─── Confirm Modal ───
function openConfirmModal(datetime,label,duration){
  pendingConfirmDate={datetime,label,duration};
  const d=new Date(datetime);
  document.getElementById('confirmDatePreview').textContent=
    d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long',hour:'2-digit',minute:'2-digit'})+
    (duration?' ('+duration+')':'');
  document.getElementById('confirmModal').classList.add('visible');
}
function closeModal(){
  document.getElementById('confirmModal').classList.remove('visible');
  pendingConfirmDate=null;
}
async function doConfirm(){
  if(!pendingConfirmDate)return;
  const btn=document.getElementById('doConfirmBtn');
  btn.disabled=true;document.getElementById('doConfirmText').innerHTML='<div class="spinner"></div> 処理中...';
  try{
    const upd={status:'confirmed',confirmedDate:pendingConfirmDate};
    if(window._db){
      await window._fsOps.updateDoc(window._fsOps.doc(window._db,'events',eventId),upd);
    }else{
      const s=JSON.parse(localStorage.getItem('schedly_event_'+eventId)||'{}');
      Object.assign(s,upd);localStorage.setItem('schedly_event_'+eventId,JSON.stringify(s));
    }
    eventData=Object.assign({},eventData,upd);
    if(eventData.settings&&eventData.settings.notifyConfirm)await sendConfirmEmails();
    closeModal();showToast('日程を確定しました！ 🎉','success');renderPage();
  }catch(e){
    showToast('確定に失敗しました: '+e.message,'error');
    btn.disabled=false;document.getElementById('doConfirmText').textContent='✓ 確定する';
  }
}
async function sendConfirmEmails(){
  const cd=pendingConfirmDate||eventData.confirmedDate;if(!cd)return;
  const d=new Date(cd.datetime);
  const dateStr=d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long',hour:'2-digit',minute:'2-digit'});
  const gcalUrl=makeGCalUrl(cd.datetime);
  const icsUrl=makeICSDataUrl(cd.datetime,cd.duration);
  const targets=eventData.mode==='closed'?participants.map(function(p){return p.email;}):
    [...new Set(Object.values(votes).map(function(v){return v.name;}).filter(function(n){return n&&n.includes('@');}))];
  for(let i=0;i<targets.length;i++){
    try{
      await emailjs.send(EMAILJS_B.serviceId,EMAILJS_B.confirmTemplateId,{
        to_email:targets[i],event_title:eventData.title,confirmed_date:dateStr,
        event_location:eventData.location||'未定',event_description:eventData.description||'',
        gcal_url:gcalUrl,ics_url:icsUrl,from_name:'Schedly'
      },EMAILJS_B.publicKey);
    }catch(e){console.warn('確定メール失敗:',targets[i],e);}
  }
}

// ─── Close Event ───
async function closeEvent(){
  if(!confirm('受付を終了しますか？'))return;
  try{
    if(window._db){await window._fsOps.updateDoc(window._fsOps.doc(window._db,'events',eventId),{status:'closed'});}
    else{const s=JSON.parse(localStorage.getItem('schedly_event_'+eventId)||'{}');s.status='closed';localStorage.setItem('schedly_event_'+eventId,JSON.stringify(s));}
    eventData.status='closed';showToast('受付を終了しました','success');renderPage();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ─── Reminder ───
async function sendReminder(){
  const vArr=Object.values(votes);
  const emailsReplied=new Set(vArr.map(function(v){return v.name;}));
  const unreplied=participants.filter(function(p){return!p.replied&&!emailsReplied.has(p.email);});
  if(!unreplied.length){showToast('未回答者はいません','info');return;}
  if(!confirm(unreplied.length+'名にリマインドを送信しますか？'))return;
  const base=location.origin+location.pathname.replace('admin.html','');
  const deadline=eventData.deadline?new Date(eventData.deadline).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  let sent=0;
  for(let i=0;i<unreplied.length;i++){
    const p=unreplied[i];
    const aUrl=base+'event.html?id='+eventId+'&token='+p.token;
    try{
      await emailjs.send(EMAILJS_B.serviceId,EMAILJS_B.reminderTemplateId,{
        to_email:p.email,event_title:eventData.title,deadline,answer_url:aUrl,from_name:'Schedly'
      },EMAILJS_B.publicKey);sent++;
    }catch(e){console.warn('リマインド失敗:',p.email,e);}
  }
  showToast(sent+'名にリマインドを送信しました','success');
}

// ─── Proposals ───
async function handleProposal(pid,action){
  const pr=proposals.find(function(p){return p.id===pid;});if(!pr)return;
  const isAccept=action==='accept';
  if(!confirm(isAccept?'この対案を受理しますか？\n受理すると候補日時に追加されます。':'この対案を却下しますか？'))return;
  try{
    pr.status=isAccept?'accepted':'rejected';
    if(window._db){
      await window._fsOps.updateDoc(window._fsOps.doc(window._db,'events',eventId,'proposals',pid),{status:pr.status});
      if(isAccept){
        const newDate={datetime:pr.proposedDate,label:pr.proposedDate,duration:''};
        eventData.dates=[...(eventData.dates||[]),newDate];
        await window._fsOps.updateDoc(window._fsOps.doc(window._db,'events',eventId),{dates:eventData.dates});
      }
    }else{
      const prs=JSON.parse(localStorage.getItem('schedly_proposals_'+eventId)||'[]');
      const idx=prs.findIndex(function(p){return p.id===pid;});if(idx!==-1)prs[idx].status=pr.status;
      localStorage.setItem('schedly_proposals_'+eventId,JSON.stringify(prs));
      if(isAccept){
        const ev=JSON.parse(localStorage.getItem('schedly_event_'+eventId)||'{}');
        ev.dates=[...(ev.dates||[]),{datetime:pr.proposedDate,label:pr.proposedDate,duration:''}];
        localStorage.setItem('schedly_event_'+eventId,JSON.stringify(ev));
        eventData.dates=ev.dates;
      }
    }
    // 対案結果メール
    if(pr.email){
      try{
        await emailjs.send(EMAILJS_B.serviceId,EMAILJS_B.proposalTemplateId,{
          to_email:pr.email,event_title:eventData.title,
          proposed_date:pr.proposedDate,result:isAccept?'受理されました':'却下されました',from_name:'Schedly'
        },EMAILJS_B.publicKey);
      }catch(e){console.warn('対案結果メール失敗:',e);}
    }
    showToast(isAccept?'対案を受理しました。候補日時に追加しました。':'対案を却下しました。',isAccept?'success':'info');
    renderPage();
  }catch(e){showToast('エラー: '+e.message,'error');}
}

// ─── GCal / ICS ───
function makeGCalUrl(datetime){
  try{
    const s=new Date(datetime),e=new Date(s.getTime()+60*60*1000);
    const fmt=function(d){return d.toISOString().replace(/[-:]/g,'').replace('.000','');};
    return'https://calendar.google.com/calendar/render?'+new URLSearchParams({action:'TEMPLATE',text:eventData.title,dates:fmt(s)+'/'+fmt(e),details:eventData.description||'',location:eventData.location||''});
  }catch(e){return'';}
}
function makeICSDataUrl(datetime,duration){
  try{
    const s=new Date(datetime),e=new Date(s.getTime()+60*60*1000);
    const fmt=function(d){return d.toISOString().replace(/[-:]/g,'').replace('.000','');};
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT','DTSTART:'+fmt(s),'DTEND:'+fmt(e),'SUMMARY:'+eventData.title,'DESCRIPTION:'+(eventData.description||''),'LOCATION:'+(eventData.location||''),'END:VEVENT','END:VCALENDAR'].join('\r\n');
    return'data:text/calendar;charset=utf8,'+encodeURIComponent(ics);
  }catch(e){return'';}
}

// ─── Helpers ───
function formatDatetime(dt){
  try{return new Date(dt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long',hour:'2-digit',minute:'2-digit'});}catch(e){return dt;}
}
function showError(title,desc){
  document.getElementById('mainContent').innerHTML=
    '<div class="error-state">'+
      '<div style="font-size:48px;margin-bottom:16px">❌</div>'+
      '<div style="font-size:20px;font-weight:600;margin-bottom:8px">'+escHtml(title)+'</div>'+
      (desc?'<div style="color:var(--text2);font-size:14px;margin-bottom:24px">'+escHtml(desc)+'</div>':'')+
      '<a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:var(--radius);font-size:14px;text-decoration:none">← 新しいイベントを作成</a>'+
    '</div>';
}
function showToast(msg,type){
  type=type||'info';
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast '+type;
  const ic={success:'✓',error:'✕',info:'ℹ'};
  t.innerHTML='<span>'+(ic[type]||'•')+'</span><span>'+msg+'</span>';
  c.appendChild(t);
  setTimeout(function(){t.classList.add('toast-out');setTimeout(function(){t.remove();},300);},3500);
}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
